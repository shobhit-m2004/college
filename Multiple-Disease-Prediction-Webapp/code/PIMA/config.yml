data_path: "pima_diabetes.csv"
target: "Outcome"
test_size: 0.2
random_state: 42
cv_folds: 5
nested_cv_folds: 3
top_n: 4
n_trials: 30
artifact_dir: "artifacts"
use_gpu: false
save_pickle: true
report_pdf_name: "model_report.pdf"
n_jobs: 1
smote_ratio_trigger: 0.75
outlier_lower_q: 1.0
outlier_upper_q: 99.0
feature_importance_top_n: 15
enable_shap: true
shap_background_size: 120
shap_top_n: 10
fairness_columns: ["Gender", "gender", "Sex", "sex"]
