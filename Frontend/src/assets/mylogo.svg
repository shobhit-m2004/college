<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 140" width="640" height="140" aria-labelledby="title desc" role="img">
  <title id="title">Doctor+ logo</title>
  <desc id="desc">Blue rounded-square icon with a star-shaped cross and a dot, followed by large text Doctor+.</desc>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#556BFF"/>
      <stop offset="1" stop-color="#2D4CFF"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2AA7FF"/>
      <stop offset="1" stop-color="#00D1C8"/>
    </linearGradient>
  </defs>

  <!-- Icon background: rounded square -->
  <g transform="translate(12,20) scale(1.5)">
    <rect width="64" height="64" rx="14" ry="14" fill="url(#g1)" />

    <!-- Small dot at top-right -->
    <circle cx="60" cy="6" r="4.5" fill="#2D4CFF" opacity="0.95" />

    <!-- Star/cross -->
    <rect x="28" y="14" width="8" height="36" rx="4" ry="4" fill="#FFF" opacity="0.98"/>
    <rect x="14" y="28" width="36" height="8" rx="4" ry="4" fill="#FFF" opacity="0.98"/>
    <rect x="24" y="24" width="16" height="16" rx="2" ry="2" fill="url(#g2)" transform="rotate(45 32 32)"/>
  </g>

  <!-- Text: Doctor+ (larger and well-positioned) -->
  <g transform="translate(160,90)">
    <text x="0" y="0" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial"
          font-weight="800" font-size="68" fill="#152A7A" letter-spacing="0.5">
      Doctor
    </text>
    <text x="250" y="0" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial"
          font-weight="800" font-size="68" fill="#00BFA5">
      +
    </text>
  </g>
</svg>
